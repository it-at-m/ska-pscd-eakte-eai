name: pcsdeakte-stack

services:
  postgres:
    image: postgres:17.4-alpine3.21@sha256:7062a2109c4b51f3c792c7ea01e83ed12ef9a980886e3b3d380a7d2e5f6ce3f5
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
    ports:
      - "5432:5432"
    healthcheck: &healthcheck
      test: ["CMD-SHELL", "pg_isready -d postgres -U admin"]
      interval: 30s
      timeout: 60s
      retries: 3
      start_period: 60s
    security_opt: &security_settings
      - no-new-privileges:true

  pg-admin:
    image: dpage/pgadmin4:9.15.0@sha256:cefc4cc6b7d9d71a9e81e76fb9d7e14038ab5661b539a190eea1b63fa612589a
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
      - PGADMIN_CONFIG_SERVER_MODE=False
      - PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=False
      - PGADMIN_REPLACE_SERVERS_ON_STARTUP=True
      - PGADMIN_DISABLE_POSTFIX=True
      - PGADMIN_LISTEN_PORT=5050
      - PGADMIN_CONFIG_UPGRADE_CHECK_ENABLED=False
    ports:
      - "5050:5050"
    depends_on:
      - postgres
    healthcheck:
      <<: *healthcheck
      test: ["CMD", "wget", "-O", "-", "http://localhost:5050/misc/ping"]
    security_opt: *security_settings
    volumes:
      - './pgadmin/servers.json:/pgadmin4/servers.json:ro'
      - './pgadmin/preferences.json:/pgadmin4/preferences.json:ro'
      - './pgadmin/pgpass:/tmp/pgpass.mounted:ro'
      - './pgadmin/data:/tmp/data'
    entrypoint: >
      /bin/sh -c "
        cp -f /tmp/pgpass.mounted /tmp/pgpass;
        chmod 600 /tmp/pgpass;
        /entrypoint.sh
      "
