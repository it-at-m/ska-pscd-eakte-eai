spring:
  main:
    banner-mode: console
    web-application-type: none
  application:
    name: @project.artifactId@
    group: @project.groupId@
    version: @project.version@
  datasource:
    url:     # Must be configured
    username: # Must be configured
    password:  # Must be configured
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: # Must be configured
  flyway:
    enabled: true
    baseline-on-migrate: false
    schemas: # Must be configured

server:
  error:
    whitelabel:
      enabled: false

management:
  endpoints:
    access:
      default: none
    web:
      exposure:
        include:
          - health
          - info
          - prometheus
          - sbom
      path-mapping:
        prometheus: metrics
  endpoint:
    health:
      access: read_only
      probes:
        enabled: true
    info:
      access: read_only
    prometheus:
      access: read_only
    sbom:
      access: read_only
  info:
    env:
      enabled: true
    camel:
      enabled: false
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

logging:
  level:
    root: info
  structured:
    format:
      console: logstash
    json:
      stacktrace:
        root: first
        # default max size of one log line in docker is 16kb - UTF8 ~ 1 Character = 1 Byte
        # therefore limit stack traces to a maximum of 8192 characters (to leave room for the rest of the message)
        max-length: 8192
      add:
        application_name: ${spring.application.name}
        application_group: ${spring.application.group}

info:
  application:
    name: ${spring.application.name}
    version: ${spring.application.version}
    group: ${spring.application.group}
    description: "@project.description@"
  build:
    java.version: "@java.version@"
    camel.version: "@camel-spring-boot-dependencies.version@"

camel:
  servlet:
    mapping:
      context-path: /api/*

dms:
  XAnwendung: "PSCD-eAkte-EAI"
  base-url: "https://cap-eakte-resteai-test-bay-eakte-resteai.apps.test.capk.muenchen.de/api"
  aktenplannummer: "demo1"
  coo-einzelakte: "COO.2150.8819.2.1652"
  coo-km-akte: "COO.2150.8801.2.1055475"
  jobposition: "DocumentManager"
  joboe: "COO.2150.8800.1.237"

